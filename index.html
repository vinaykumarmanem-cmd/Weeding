<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Naga Raju & Sai Nirosha</title>

<style>
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    background: linear-gradient(-45deg, #fff5f5, #fef3e2, #fdf5e6, #fffafa);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 30px 0 30px 0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 420px;
    width: 85%;
    border: 2px solid #d4af37;
    position: relative;
}

.card::before {
    content: "❦";
    font-size: 30px;
    color: #d4af37;
    display: block;
    margin-bottom: 10px;
}

h1 { color: #8b0000; }

.couple-names {
    font-size: 2.4rem;
    color: #8b0000;
    font-weight: bold;
    line-height: 1.4;
    letter-spacing: 1px;
}

/* 🌟 NEW BEAUTIFUL BACKGROUND */
.names-box {
    background: linear-gradient(135deg, #fff8e7, #fdf2d0);
    padding: 20px;
    border-radius: 15px;
    margin: 15px 0;
    box-shadow: 0 5px 15px rgba(212,175,55,0.2);
    border: 1px solid #f1d27a;
}

.couple-photo {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.couple-photo img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #d4af37;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.btn {
    padding: 12px 30px;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    margin-top: 15px;
}

.btn-open {
    background: #d4af37;
    color: white;
}

.btn-maps {
    background: white;
    color: #d4af37;
    border: 1px solid #d4af37;
}

.music-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

/* Hidden */
#secret-details {
    display: none;
}

.venue-info {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<!-- 🔊 Hidden initially -->
<button id="musicBtn" class="music-btn" onclick="toggleMusic()" style="display:none;">
🔊
</button>

<!-- Cover -->
<div id="cover">
    <h1>You're Invited!</h1>
    <p>To the wedding celebration of</p>
    <h2 style="color:#d4af37">Naga Raju & Sai Nirosha</h2>
    <button class="btn btn-open" onclick="openInvite()">Open Invitation</button>
</div>

<!-- Details -->
<div id="secret-details">

    <div class="couple-photo">
        <img src="couple.jpg.jpeg" alt="Naga Raju & Sai Nirosha">
    </div>

    <!-- 🌟 Names with background -->
    <div class="names-box">
        <div class="couple-names">
            Naga Raju <br>&<br> Sai Nirosha
        </div>
    </div>

    <div style="color:#d4af37; font-size:20px;">❦ ❦ ❦</div>

    <p><strong>April 29, 2026</strong></p>

    <div class="venue-info">
        <strong>Venue:</strong><br>
        At Our Residence, Chapara Village<br>
        PIN: 532216
    </div>

    <a href="https://www.google.com/maps/search/?api=1&query=Chapara+Village+pedda+devara+veedhi+532216" 
       target="_blank" class="btn btn-maps">
       📍 View on Google Maps
    </a>

    <p style="margin-top:20px; font-size: 14px; color: #8b0000;">
        Your presence will be a cherished blessing as we begin this new journey together ✨
    </p>

</div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop>
    <source src="song.mp3.mpeg" type="audio/mpeg">
</audio>

<script>
function openInvite() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('secret-details').style.display = 'block';

    document.getElementById('musicBtn').style.display = 'block';

    const music = document.getElementById('bg-music');
    music.play();
}

function toggleMusic() {
    const music = document.getElementById('bg-music');

    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
